<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paramètres | Linguère Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin-variables.css">
  <link rel="stylesheet" href="/admin/css/admin-base.css">
  <link rel="stylesheet" href="/admin/css/admin-sidebar.css">
  <link rel="stylesheet" href="/admin/css/admin-components.css">
  <link rel="stylesheet" href="/admin/css/admin-responsive.css">
</head>
<body>
  <div class="admin-layout">
    <div class="admin-content">
      <div class="page-header">
        <div>
          <h1><span>Paramètres</span></h1>
          <p>Configurez les paramètres généraux du site Linguère Digital</p>
        </div>
      </div>

      <div class="tabs-nav" id="settings-tabs">
        <button class="tab-btn active" data-tab="profil">Profil</button>
        <button class="tab-btn" data-tab="entreprise">Entreprise</button>
        <button class="tab-btn" data-tab="reseaux">Réseaux Sociaux</button>
        <button class="tab-btn" data-tab="seo">SEO</button>
        <button class="tab-btn" data-tab="systeme">Système</button>
      </div>

      <div id="settings-tab-content" class="admin-card">
        <div class="admin-card-body" id="tab-content-area">
          <!-- Tab content will be rendered here -->
        </div>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/admin/js/admin-auth.js"></script>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/admin-components.js"></script>
  <script src="/admin/js/admin-sidebar.js"></script>
  <script src="/admin/js/pages/parametres.js"></script>
</body>
</html>
