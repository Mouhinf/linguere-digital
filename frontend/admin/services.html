<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Services | Linguère Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin-variables.css">
  <link rel="stylesheet" href="/admin/css/admin-base.css">
  <link rel="stylesheet" href="/admin/css/admin-sidebar.css">
  <link rel="stylesheet" href="/admin/css/admin-components.css">
  <link rel="stylesheet" href="/admin/css/admin-responsive.css">
</head>
<body>
  <div class="admin-layout">
    <div class="admin-content">
      <div class="page-header">
        <div>
          <h1>Gestion des <span>Services</span></h1>
          <p>Gérez les services proposés par Linguère Digital</p>
        </div>
        <button class="btn btn-primary" id="add-service-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouveau Service
        </button>
      </div>

      <div class="admin-card">
        <div class="admin-card-body">
          <div class="admin-table-wrapper">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Titre</th>
                  <th>Catégorie</th>
                  <th>Description</th>
                  <th>Prix</th>
                  <th>Ordre</th>
                  <th>Statut</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="services-tbody">
                <tr><td colspan="7" class="text-center text-muted">Chargement...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="service-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Nouveau Service</h2>
        <button class="modal-close" id="cancel-btn" aria-label="Fermer">&times;</button>
      </div>
      <form id="service-form">
        <input type="hidden" id="service-id">
        <div class="form-group">
          <label for="titre" class="form-label">Titre</label>
          <input type="text" id="titre" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="categorie" class="form-label">Catégorie</label>
          <select id="categorie" class="form-control" required>
            <option value="informatique">Informatique</option>
            <option value="data-science">Data Science</option>
            <option value="marketing">Marketing Digital</option>
            <option value="formation">Formation</option>
          </select>
        </div>
        <div class="form-group">
          <label for="description" class="form-label">Description courte</label>
          <textarea id="description" class="form-control" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label for="descriptionLongue" class="form-label">Description détaillée</label>
          <textarea id="descriptionLongue" class="form-control" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label for="icone" class="form-label">Icône (nom)</label>
          <input type="text" id="icone" class="form-control" placeholder="globe, brain, trending-up, book">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="prix" class="form-label">Prix (XOF)</label>
            <input type="number" id="prix" class="form-control" step="0.01">
          </div>
          <div class="form-group">
            <label for="ordre" class="form-label">Ordre d'affichage</label>
            <input type="number" id="ordre" class="form-control" value="0">
          </div>
        </div>
        <div class="form-group">
          <label class="toggle-switch">
            <input type="checkbox" id="actif" checked>
            <span class="toggle-track"></span>
            <span class="toggle-label">Service actif</span>
          </label>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="cancel-btn-bottom">Annuler</button>
          <button type="submit" class="btn btn-primary">Sauvegarder</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/admin/js/admin-auth.js"></script>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/admin-components.js"></script>
  <script src="/admin/js/admin-sidebar.js"></script>
  <script src="/admin/js/pages/services.js"></script>
</body>
</html>
