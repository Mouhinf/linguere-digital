<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projets | Linguère Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin-variables.css">
  <link rel="stylesheet" href="/admin/css/admin-base.css">
  <link rel="stylesheet" href="/admin/css/admin-sidebar.css">
  <link rel="stylesheet" href="/admin/css/admin-components.css">
  <link rel="stylesheet" href="/admin/css/admin-responsive.css">
</head>
<body>
  <div class="admin-layout">
    <div class="admin-content">
      <div class="page-header">
        <div>
          <h1>Gestion des <span>Projets</span></h1>
          <p>Gérez les projets et réalisations de Linguère Digital</p>
        </div>
        <button class="btn btn-primary" id="add-project-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouveau Projet
        </button>
      </div>

      <div class="admin-card">
        <div class="admin-card-body">
          <div class="admin-table-wrapper">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Image</th>
                  <th>Titre</th>
                  <th>Catégorie</th>
                  <th>Description</th>
                  <th>Technologies</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="projects-tbody">
                <tr><td colspan="7" class="text-center text-muted">Chargement...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="project-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Nouveau Projet</h2>
        <button class="modal-close" aria-label="Fermer">&times;</button>
      </div>
      <form id="project-form">
        <input type="hidden" id="project-id">
        <div class="form-group">
          <label for="titre" class="form-label">Titre</label>
          <input type="text" id="titre" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="categorie" class="form-label">Catégorie</label>
          <select id="categorie" class="form-control" required>
            <option value="Web">Web</option>
            <option value="Mobile">Mobile</option>
            <option value="Data">Data Science</option>
            <option value="IA">Intelligence Artificielle</option>
            <option value="Design">Design</option>
            <option value="Autre">Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label for="description" class="form-label">Description courte</label>
          <textarea id="description" class="form-control" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label for="descriptionLongue" class="form-label">Description détaillée</label>
          <textarea id="descriptionLongue" class="form-control" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label for="image-url" class="form-label">URL Image</label>
          <input type="url" id="image-url" class="form-control" placeholder="https://...">
        </div>
        <div class="form-group">
          <label for="technologies" class="form-label">Technologies (séparées par des virgules)</label>
          <input type="text" id="technologies" class="form-control" placeholder="React, Node.js, MongoDB">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="lien-projet" class="form-label">Lien du Projet</label>
            <input type="url" id="lien-projet" class="form-control" placeholder="https://...">
          </div>
          <div class="form-group">
            <label for="date-projet" class="form-label">Date</label>
            <input type="date" id="date-projet" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="cancel-btn">Annuler</button>
          <button type="submit" class="btn btn-primary">Sauvegarder</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/admin/js/admin-auth.js"></script>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/admin-components.js"></script>
  <script src="/admin/js/admin-sidebar.js"></script>
  <script src="/admin/js/pages/projets.js"></script>
</body>
</html>
