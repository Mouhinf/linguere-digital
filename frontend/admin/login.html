<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Linguère Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin-variables.css">
  <link rel="stylesheet" href="/admin/css/admin-base.css">
  <link rel="stylesheet" href="/admin/css/admin-components.css">
  <style>
    /* Login Page Specific Styles */
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Background decoration */
    .login-page::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(circle at 20% 80%, rgba(0, 180, 216, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(0, 119, 182, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(3, 4, 94, 0.15) 0%, transparent 70%);
      animation: bgFloat 20s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, 1%) rotate(1deg); }
      66% { transform: translate(-1%, 2%) rotate(-1deg); }
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: var(--admin-glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--admin-glass-border);
      border-radius: var(--admin-radius-lg);
      padding: 2.5rem 2rem;
      box-shadow: var(--admin-shadow-lg);
      animation: cardAppear 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      background: var(--admin-gradient-glow);
      border: 1px solid var(--admin-glass-border);
      border-radius: var(--admin-radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--admin-primary);
      animation: logoFloat 3s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .login-logo svg {
      width: 32px;
      height: 32px;
    }

    .login-header h1 {
      font-family: var(--admin-font-heading);
      font-size: var(--admin-fs-lg);
      font-weight: 700;
      background: var(--admin-gradient-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.35rem;
    }

    .login-header p {
      color: var(--admin-gray-3);
      font-size: var(--admin-fs-sm);
    }

    .login-form .form-group {
      margin-bottom: 1.25rem;
    }

    .login-form label {
      display: block;
      color: var(--admin-gray-2);
      font-weight: 500;
      font-size: var(--admin-fs-sm);
      margin-bottom: 0.4rem;
    }

    .login-form .input-wrapper {
      position: relative;
    }

    .login-form .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--admin-surface);
      border: 1px solid var(--admin-glass-border);
      border-radius: var(--admin-radius);
      color: var(--admin-gray-1);
      font-size: var(--admin-fs-base);
      font-family: var(--admin-font-body);
      transition: all var(--admin-transition-fast);
      outline: none;
    }

    .login-form .form-control:focus {
      border-color: var(--admin-primary);
      box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.15);
      background: var(--admin-surface-2);
    }

    .login-form .form-control::placeholder {
      color: var(--admin-gray-4);
    }

    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--admin-gray-3);
      cursor: pointer;
      padding: 0.25rem;
      transition: color var(--admin-transition-fast);
      display: flex;
      align-items: center;
    }

    .password-toggle:hover {
      color: var(--admin-primary);
    }

    .password-toggle svg {
      width: 18px;
      height: 18px;
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: var(--admin-gradient-main);
      color: var(--admin-white);
      border: none;
      border-radius: var(--admin-radius);
      font-weight: 600;
      font-size: var(--admin-fs-base);
      font-family: var(--admin-font-heading);
      cursor: pointer;
      transition: all var(--admin-transition-fast);
      margin-top: 0.5rem;
      letter-spacing: 0.03em;
    }

    .btn-login:hover:not(:disabled) {
      box-shadow: var(--admin-glow);
      transform: translateY(-2px);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-error {
      background: var(--admin-danger-dim);
      border: 1px solid rgba(255, 107, 107, 0.4);
      color: var(--admin-danger);
      padding: 0.75rem 1rem;
      border-radius: var(--admin-radius);
      margin-bottom: 1.25rem;
      font-size: var(--admin-fs-sm);
      display: none;
      animation: shake 300ms ease-in-out;
    }

    .login-error.show {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .login-error svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .login-footer {
      text-align: center;
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--admin-glass-border);
    }

    .login-footer p {
      color: var(--admin-gray-3);
      font-size: var(--admin-fs-xs);
    }

    .login-footer a {
      color: var(--admin-primary);
      font-weight: 500;
      transition: color var(--admin-transition-fast);
    }

    .login-footer a:hover {
      color: var(--admin-primary-bright);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem;
      }

      .login-logo {
        width: 56px;
        height: 56px;
      }

      .login-header h1 {
        font-size: var(--admin-fs-md);
      }
    }
  </style>
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"/>
            <path d="M12 2a15.3 15.3 0 0 0-4 10 15.3 15.3 0 0 0 4 10"/>
            <path d="M2 12h20"/>
          </svg>
        </div>
        <h1>Panneau d'Administration</h1>
        <p>Linguère Digital Innovation</p>
      </div>

      <div id="login-error" class="login-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span></span>
      </div>

      <form id="login-form" class="login-form" autocomplete="on">
        <div class="form-group">
          <label for="email">Adresse email</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="email"
              name="email"
              class="form-control"
              placeholder="admin@lingueredigital.com"
              required
              autocomplete="email"
              value="admin@lingueredigital.com"
            >
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="Votre mot de passe"
              required
              autocomplete="current-password"
              value="Admin@2025"
            >
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Afficher le mot de passe">
              <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="login-btn">
          Se connecter
        </button>
      </form>

      <div class="login-footer">
        <p>Besoin d'aide ? <a href="mailto:linguere660@gmail.com">Contactez le support</a></p>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script>
    // Password visibility toggle
    const passwordToggle = document.getElementById('password-toggle');
    const passwordInput = document.getElementById('password');
    const eyeOpen = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');

    passwordToggle.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeOpen.style.display = isPassword ? 'none' : 'block';
      eyeClosed.style.display = isPassword ? 'block' : 'none';
      passwordToggle.setAttribute('aria-label', isPassword ? 'Cacher le mot de passe' : 'Afficher le mot de passe');
    });

    // Login form submission
    const loginForm = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const errorDiv = document.getElementById('login-error');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;

      loginBtn.disabled = true;
      loginBtn.textContent = 'Connexion en cours...';
      errorDiv.classList.remove('show');

      try {
        const response = await API.login(email, password);
        localStorage.setItem('auth_token', response.token);
        localStorage.setItem('user', JSON.stringify(response.user));
        window.location.href = '/admin/dashboard.html';
      } catch (error) {
        errorDiv.querySelector('span').textContent = error.message || 'Email ou mot de passe incorrect';
        errorDiv.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Se connecter';
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('auth_token')) {
      try {
        window.location.href = '/admin/dashboard.html';
      } catch (e) {
        // Token might be invalid, let the user log in
      }
    }
  </script>
</body>
</html>
