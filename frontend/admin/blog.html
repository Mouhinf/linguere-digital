<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Admin Linguère Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin-variables.css">
  <link rel="stylesheet" href="/admin/css/admin-base.css">
  <link rel="stylesheet" href="/admin/css/admin-sidebar.css">
  <link rel="stylesheet" href="/admin/css/admin-components.css">
  <link rel="stylesheet" href="/admin/css/admin-responsive.css">
</head>
<body>
  <div class="admin-layout">
    <div class="admin-content">
      <div class="page-header">
        <div>
          <h1>Gestion du <span>Blog</span></h1>
          <p>Gérez les articles et actualités de Linguère Digital</p>
        </div>
        <a href="/admin/blog-edit.html" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouvel Article
        </a>
      </div>

      <div class="admin-card">
        <div class="admin-card-body">
          <div class="admin-table-wrapper">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Titre</th>
                  <th>Catégorie</th>
                  <th>Auteur</th>
                  <th>Statut</th>
                  <th>Date</th>
                  <th>Vues</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="blog-table-body">
                <tr>
                  <td colspan="7" class="text-center text-muted">Chargement...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/admin/js/admin-auth.js"></script>
  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/admin-components.js"></script>
  <script src="/admin/js/admin-sidebar.js"></script>
  <script src="/admin/js/pages/blog.js"></script>
</body>
</html>
