<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Linguère Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    body { padding-top: 70px; }
    .page-hero { min-height: 40vh; display: flex; align-items: center; background: rgba(3, 4, 94, 0.3); border-bottom: 1px solid var(--color-glass-border); }

    /* Blog Grid */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    /* Blog Card */
    .blog-card {
      background: var(--color-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--color-glass-border);
      border-radius: 16px;
      overflow: hidden;
      transition: all var(--transition-base);
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .blog-card:hover {
      transform: translateY(-8px);
      border-color: var(--color-glass-border-bright);
      box-shadow: var(--shadow-card-hover);
    }

    .blog-card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-bottom: 1px solid var(--color-glass-border);
      background: var(--color-surface-2);
    }

    .blog-card-image-placeholder {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-secondary), var(--color-primary));
      border-bottom: 1px solid var(--color-glass-border);
      color: var(--color-white);
      font-size: 3rem;
    }

    .blog-card-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .blog-card-category {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: rgba(0, 180, 216, 0.15);
      color: var(--color-primary);
      border-radius: 20px;
      font-size: var(--fs-tiny);
      font-weight: 600;
      margin-bottom: 0.75rem;
      width: fit-content;
    }

    .blog-card-title {
      font-size: var(--fs-h3);
      color: var(--color-white);
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .blog-card-description {
      color: var(--color-gray-2);
      font-size: var(--fs-small);
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .blog-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1rem;
      border-top: 1px solid var(--color-glass-border);
    }

    .blog-card-meta {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .blog-card-date {
      font-size: var(--fs-tiny);
      color: var(--color-gray-3);
    }

    .blog-card-author {
      font-size: var(--fs-tiny);
      color: var(--color-gray-2);
    }

    .blog-card-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--color-primary);
      font-weight: 600;
      font-size: var(--fs-small);
      transition: color var(--transition-base);
    }

    .blog-card-link:hover {
      color: var(--color-primary-bright);
    }

    .blog-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .blog-card-tag {
      padding: 0.2rem 0.5rem;
      background: var(--color-surface-2);
      border: 1px solid var(--color-glass-border);
      border-radius: 4px;
      font-size: var(--fs-tiny);
      color: var(--color-gray-2);
    }

    /* Loading & Empty States */
    .loading-state, .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--color-gray-2);
    }

    .loading-state .spinner {
      margin: 0 auto 1.5rem;
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .filter-tab {
      padding: 0.5rem 1.25rem;
      background: var(--color-glass);
      border: 1px solid var(--color-glass-border);
      border-radius: 50px;
      color: var(--color-gray-2);
      font-size: var(--fs-small);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .filter-tab:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .filter-tab.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: var(--color-white);
    }

    /* Responsive rules moved to responsive.css */
  </style>
</head>
<body>
  <section class="page-hero">
    <div class="container">
      <h1 class="reveal">Blog & Actualités</h1>
      <p class="text-gray reveal" style="animation-delay: 0.1s;">Restez informé des dernières tendances technologiques</p>
    </div>
  </section>

  <main class="container py-5">
    <div class="filter-tabs stagger-children" id="filter-tabs">
      <button class="filter-tab active" data-category="all">Tous</button>
    </div>

    <div class="blog-grid" id="blog-grid">
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <p>Chargement des articles...</p>
      </div>
    </div>

    <div class="empty-state hidden" id="empty-state">
      <div class="empty-state-icon">📝</div>
      <h3>Aucun article pour le moment</h3>
      <p>Revenez bientôt pour découvrir nos publications !</p>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/animations.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/blog.js"></script>
</body>
</html>
