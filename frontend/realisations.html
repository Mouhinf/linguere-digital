<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Découvrez les réalisations de Linguère Digital : projets web, applications mobiles, solutions IA et campagnes marketing pour nos clients au Sénégal et en Afrique.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://lingueredigital.com/realisations.html">
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <title>Réalisations | Linguère Digital</title>

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lingueredigital.com/realisations.html">
  <meta property="og:title" content="Réalisations | Linguère Digital">
  <meta property="og:description" content="Projets web, applications mobiles et solutions IA réalisés par Linguère Digital.">
  <meta property="og:image" content="https://lingueredigital.com/assets/logo.png">
  <meta property="og:site_name" content="Linguère Digital">
  <meta property="og:locale" content="fr_SN">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Réalisations | Linguère Digital">
  <meta name="twitter:description" content="Projets web, applications et solutions IA réalisés par Linguère Digital.">
  <meta name="twitter:image" content="https://lingueredigital.com/assets/logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    body { padding-top: 70px; }
    .page-hero { min-height: 40vh; display: flex; align-items: center; background: rgba(3, 4, 94, 0.3); border-bottom: 1px solid var(--color-glass-border); }

    /* Realisations Grid */
    .realisations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    /* Project Card */
    .project-card {
      background: var(--color-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--color-glass-border);
      border-radius: 16px;
      overflow: hidden;
      transition: all var(--transition-base);
      cursor: pointer;
    }

    .project-card:hover {
      transform: translateY(-8px);
      border-color: var(--color-glass-border-bright);
      box-shadow: var(--shadow-card-hover);
    }

    .project-card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-bottom: 1px solid var(--color-glass-border);
      background: var(--color-surface-2);
    }

    .project-card-image-placeholder {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-glass-border);
      color: var(--color-gray-3);
      font-size: 3rem;
    }

    .project-card-body {
      padding: 1.5rem;
    }

    .project-card-category {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: rgba(0, 180, 216, 0.15);
      color: var(--color-primary);
      border-radius: 20px;
      font-size: var(--fs-tiny);
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .project-card-title {
      font-size: var(--fs-h3);
      color: var(--color-white);
      margin-bottom: 0.5rem;
    }

    .project-card-description {
      color: var(--color-gray-2);
      font-size: var(--fs-small);
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .project-card-techs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .project-card-tech {
      padding: 0.25rem 0.6rem;
      background: var(--color-surface-2);
      border: 1px solid var(--color-glass-border);
      border-radius: 6px;
      font-size: var(--fs-tiny);
      color: var(--color-gray-2);
    }

    .project-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1rem;
      border-top: 1px solid var(--color-glass-border);
    }

    .project-card-date {
      font-size: var(--fs-tiny);
      color: var(--color-gray-3);
    }

    .project-card-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--color-primary);
      font-weight: 600;
      font-size: var(--fs-small);
      transition: color var(--transition-base);
    }

    .project-card-link:hover {
      color: var(--color-primary-bright);
    }

    /* Loading & Empty States */
    .loading-state, .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--color-gray-2);
    }

    .loading-state .spinner {
      margin: 0 auto 1.5rem;
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .filter-tab {
      padding: 0.5rem 1.25rem;
      background: var(--color-glass);
      border: 1px solid var(--color-glass-border);
      border-radius: 50px;
      color: var(--color-gray-2);
      font-size: var(--fs-small);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .filter-tab:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .filter-tab.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: var(--color-white);
    }

    /* Responsive rules moved to responsive.css */
  </style>
</head>
<body>
  <section class="page-hero has-particles">
    <canvas class="particles-section" data-count="50" data-distance="130" data-opacity="high"></canvas>
    <div class="container">
      <h1 class="reveal">Nos Réalisations</h1>
      <p class="text-gray reveal" style="animation-delay: 0.1s;">Découvrez les projets que nous avons menés avec succès</p>
    </div>
  </section>

  <main class="container py-5 has-particles">
    <canvas class="particles-section" data-count="50" data-distance="130" data-opacity="high"></canvas>
    <div class="filter-tabs stagger-children" id="filter-tabs">
      <button class="filter-tab active" data-category="all">Tous</button>
    </div>

    <div class="realisations-grid" id="projects-grid">
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <p>Chargement des réalisations...</p>
      </div>
    </div>

    <div class="empty-state hidden" id="empty-state">
      <div class="empty-state-icon">🚀</div>
      <h3>Aucune réalisation pour le moment</h3>
      <p>Revenez bientôt pour découvrir nos projets ! En attendant, explorez nos <a href="/services.html">services</a> ou <a href="/contact.html">contactez-nous</a>.</p>
    </div>

    <noscript>
      <div style="padding:2rem;text-align:center;color:var(--color-gray-2);">
        <p>Linguère Digital réalise des projets web, applications mobiles, solutions d'intelligence artificielle et campagnes marketing digital pour des clients au Sénégal et en Afrique.</p>
        <p><a href="/contact.html">Contactez-nous</a> pour discuter de votre projet.</p>
      </div>
    </noscript>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/animations.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/realisations.js"></script>
  <script src="/js/particles.js"></script>
</body>
</html>
